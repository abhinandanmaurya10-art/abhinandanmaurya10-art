<svg xmlns="http://www.w3.org/2000/svg" width="860" height="320" viewBox="0 0 860 320">
  <rect width="860" height="320" fill="#f6f8fa" rx="12"/>

  <!-- ═══════════════ CHART 1: Contributions ═══════════════ -->
  <text x="143" y="30" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="600" fill="#24292f">Contributions</text>

  <!-- Donut arcs: Commits 62%, PRs 18%, Issues 12%, Reviews 8% -->
  <!-- cx=143, cy=145, r=75, stroke-width=28 -->
  <!-- Commits (blue) 62% = 223.2deg -->
  <circle cx="143" cy="150" r="75" fill="none" stroke="#e8eaed" stroke-width="28"/>
  <!-- Commits 62% starting at -90deg -->
  <circle cx="143" cy="150" r="75" fill="none" stroke="#4A90D9" stroke-width="28"
    stroke-dasharray="291.24 471.24"
    stroke-dashoffset="117.81"
    transform="rotate(-90 143 150)"/>
  <!-- PRs 18% -->
  <circle cx="143" cy="150" r="75" fill="none" stroke="#7C6FCD" stroke-width="28"
    stroke-dasharray="84.82 677.66"
    stroke-dashoffset="-173.43"
    transform="rotate(-90 143 150)"/>
  <!-- Issues 12% -->
  <circle cx="143" cy="150" r="75" fill="none" stroke="#3BAD87" stroke-width="28"
    stroke-dasharray="56.55 705.93"
    stroke-dashoffset="-258.25"
    transform="rotate(-90 143 150)"/>
  <!-- Reviews 8% -->
  <circle cx="143" cy="150" r="75" fill="none" stroke="#F0A500" stroke-width="28"
    stroke-dasharray="37.70 724.78"
    stroke-dashoffset="-314.80"
    transform="rotate(-90 143 150)"/>

  <!-- Center text -->
  <text x="143" y="144" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="26" font-weight="700" fill="#24292f">62%</text>
  <text x="143" y="163" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#6e7781">commits</text>

  <!-- Legend 1 -->
  <rect x="36" y="248" width="10" height="10" rx="2" fill="#4A90D9"/>
  <text x="52" y="258" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#24292f">Commits</text>
  <text x="230" y="258" text-anchor="end" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="600" fill="#24292f">62%</text>

  <rect x="36" y="268" width="10" height="10" rx="2" fill="#7C6FCD"/>
  <text x="52" y="278" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#24292f">Pull Requests</text>
  <text x="230" y="278" text-anchor="end" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="600" fill="#24292f">18%</text>

  <rect x="36" y="288" width="10" height="10" rx="2" fill="#3BAD87"/>
  <text x="52" y="298" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#24292f">Issues</text>
  <text x="230" y="298" text-anchor="end" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="600" fill="#24292f">12%</text>

  <rect x="36" y="308" width="10" height="10" rx="2" fill="#F0A500"/>
  <text x="52" y="318" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#24292f">Code Reviews</text>
  <text x="230" y="318" text-anchor="end" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="600" fill="#24292f">8%</text>

  <!-- Divider 1 -->
  <line x1="290" y1="20" x2="290" y2="300" stroke="#d0d7de" stroke-width="1"/>

  <!-- ═══════════════ CHART 2: Streak & Activity ═══════════════ -->
  <text x="433" y="30" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="600" fill="#24292f">Streak &amp; Activity</text>

  <circle cx="433" cy="150" r="75" fill="none" stroke="#e8eaed" stroke-width="28"/>
  <!-- Active Days 55% -->
  <circle cx="433" cy="150" r="75" fill="none" stroke="#4A90D9" stroke-width="28"
    stroke-dasharray="259.18 503.30"
    stroke-dashoffset="117.81"
    transform="rotate(-90 433 150)"/>
  <!-- Rest Days 30% -->
  <circle cx="433" cy="150" r="75" fill="none" stroke="#888780" stroke-width="28"
    stroke-dasharray="141.37 621.11"
    stroke-dashoffset="-141.37"
    transform="rotate(-90 433 150)"/>
  <!-- Longest Streak 15% -->
  <circle cx="433" cy="150" r="75" fill="none" stroke="#F0A500" stroke-width="28"
    stroke-dasharray="70.69 691.79"
    stroke-dashoffset="-282.74"
    transform="rotate(-90 433 150)"/>

  <text x="433" y="144" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="26" font-weight="700" fill="#24292f">55%</text>
  <text x="433" y="163" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#6e7781">active days</text>

  <!-- Legend 2 -->
  <rect x="326" y="248" width="10" height="10" rx="2" fill="#4A90D9"/>
  <text x="342" y="258" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#24292f">Active Days</text>
  <text x="530" y="258" text-anchor="end" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="600" fill="#24292f">55%</text>

  <rect x="326" y="268" width="10" height="10" rx="2" fill="#888780"/>
  <text x="342" y="278" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#24292f">Rest Days</text>
  <text x="530" y="278" text-anchor="end" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="600" fill="#24292f">30%</text>

  <rect x="326" y="288" width="10" height="10" rx="2" fill="#F0A500"/>
  <text x="342" y="298" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#24292f">Longest Streak</text>
  <text x="530" y="298" text-anchor="end" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="600" fill="#24292f">15%</text>

  <!-- Divider 2 -->
  <line x1="580" y1="20" x2="580" y2="300" stroke="#d0d7de" stroke-width="1"/>

  <!-- ═══════════════ CHART 3: Top Languages ═══════════════ -->
  <text x="723" y="30" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="600" fill="#24292f">Top Languages</text>

  <circle cx="723" cy="150" r="75" fill="none" stroke="#e8eaed" stroke-width="28"/>
  <!-- JavaScript 35% -->
  <circle cx="723" cy="150" r="75" fill="none" stroke="#F0A500" stroke-width="28"
    stroke-dasharray="164.93 597.55"
    stroke-dashoffset="117.81"
    transform="rotate(-90 723 150)"/>
  <!-- Python 28% -->
  <circle cx="723" cy="150" r="75" fill="none" stroke="#4A90D9" stroke-width="28"
    stroke-dasharray="131.95 630.53"
    stroke-dashoffset="-47.12"
    transform="rotate(-90 723 150)"/>
  <!-- Java 18% -->
  <circle cx="723" cy="150" r="75" fill="none" stroke="#D4537E" stroke-width="28"
    stroke-dasharray="84.82 677.66"
    stroke-dashoffset="-179.07"
    transform="rotate(-90 723 150)"/>
  <!-- C++ 12% -->
  <circle cx="723" cy="150" r="75" fill="none" stroke="#3BAD87" stroke-width="28"
    stroke-dasharray="56.55 705.93"
    stroke-dashoffset="-263.89"
    transform="rotate(-90 723 150)"/>
  <!-- HTML/CSS 7% -->
  <circle cx="723" cy="150" r="75" fill="none" stroke="#7C6FCD" stroke-width="28"
    stroke-dasharray="32.97 729.51"
    stroke-dashoffset="-320.44"
    transform="rotate(-90 723 150)"/>

  <text x="723" y="144" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="26" font-weight="700" fill="#24292f">35%</text>
  <text x="723" y="163" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#6e7781">JavaScript</text>

  <!-- Legend 3 -->
  <rect x="616" y="238" width="10" height="10" rx="2" fill="#F0A500"/>
  <text x="632" y="248" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#24292f">JavaScript</text>
  <text x="840" y="248" text-anchor="end" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="600" fill="#24292f">35%</text>

  <rect x="616" y="255" width="10" height="10" rx="2" fill="#4A90D9"/>
  <text x="632" y="265" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#24292f">Python</text>
  <text x="840" y="265" text-anchor="end" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="600" fill="#24292f">28%</text>

  <rect x="616" y="272" width="10" height="10" rx="2" fill="#D4537E"/>
  <text x="632" y="282" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#24292f">Java</text>
  <text x="840" y="282" text-anchor="end" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="600" fill="#24292f">18%</text>

  <rect x="616" y="289" width="10" height="10" rx="2" fill="#3BAD87"/>
  <text x="632" y="299" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#24292f">C++</text>
  <text x="840" y="299" text-anchor="end" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="600" fill="#24292f">12%</text>

  <rect x="616" y="306" width="10" height="10" rx="2" fill="#7C6FCD"/>
  <text x="632" y="316" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#24292f">HTML/CSS</text>
  <text x="840" y="316" text-anchor="end" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="600" fill="#24292f">7%</text>
</svg>
